<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 생성기</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-content">
      <a href="#generator" class="nav-link">로또생성</a>
      <a href="#animal-test" class="nav-link">동물상 테스트</a>
      <a href="#partnership" class="nav-link">제휴문의</a>
    </div>
  </nav>

  <div class="app-container">
    <header>
      <h1>로또 & 동물상 테스트</h1>
      <p>행운의 번호와 당신의 동물상을 확인하세요!</p>
    </header>

    <main>
      <section id="generator" class="generator-section">
        <div id="balls-container" class="balls-container">
          <!-- Lotto balls will be generated here -->
        </div>
        <button id="generate-btn" class="glow-button">번호 생성하기</button>
      </section>

      <section id="animal-test" class="animal-test-section">
        <div class="glass-card">
          <h2>동물상 테스트</h2>
          <p>카메라를 통해 당신의 동물상을 확인해보세요!</p>
          <div class="test-container">
            <button type="button" class="glow-button small" onclick="initAnimalTest()">테스트 시작</button>
            <div id="webcam-container" class="webcam-wrapper"></div>
            <div id="label-container" class="label-wrapper"></div>
          </div>
        </div>
      </section>

      <section class="history-section">
        <h2>최근 생성 내역</h2>
        <div id="history-list" class="history-list">
          <!-- History items will be added here -->
        </div>
        <button id="clear-history-btn" class="text-button">내역 삭제</button>
      </section>
      
      <section id="partnership" class="partnership-section">
        <div class="glass-card">
          <h2>제휴 문의</h2>
          <p>함께 성장할 파트너를 찾습니다.</p>
          <form action="https://formspree.io/f/mvzwevpv" method="POST" class="contact-form">
            <div class="form-group">
              <label for="name">성함/기업명</label>
              <input type="text" id="name" name="name" placeholder="이름 또는 기업명을 입력해주세요" required>
            </div>
            <div class="form-group">
              <label for="email">이메일 주소</label>
              <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
              <label for="message">문의 내용</label>
              <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 상세히 적어주세요" required></textarea>
            </div>
            <button type="submit" class="glow-button small">문의하기</button>
          </form>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 행운을 빌어요!</p>
    </footer>
  </div>
  <script defer type="module" src="/main.js"></script>
</body>
</html>
